<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Sản Phẩm</title>
    <style>
        /* 1. box-sizing: border-box áp dụng toàn trang */
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Nền tối cho body để dễ nhìn card hơn (không bắt buộc) */
        body {
            background-color: #1a202c; 
            padding: 50px;
        }

        /* 2. Style cho thẻ .card (áp dụng width, border, margin) */
        .card {
            width: 280px;
            border: 2px solid #4a5568;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden; /* Để góc bo tròn cắt bớt nền của phần header */
            background-color: #2d3748; /* Màu nền tối của card */
        }

        /* Phần màu xanh tím phía trên chứa Avatar */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Vẽ biểu tượng Avatar đơn giản bằng CSS */
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(255, 255, 255, 0.15);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .avatar::before {
            content: '';
            position: absolute;
            top: 10px;
            width: 18px;
            height: 18px;
            background-color: rgba(255,255,255,0.7);
            border-radius: 50%;
        }
        .avatar::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 36px;
            height: 18px;
            background-color: rgba(255,255,255,0.7);
            border-radius: 18px 18px 0 0;
        }

        /* 3. Style cho .card-body (áp dụng padding) */
        .card-body {
            padding: 20px 20px 24px;
            color: #ffffff;
        }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: bold;
        }

        .card-desc {
            margin: 0 0 20px 0;
            font-size: 13px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        /* Nút Xem thêm */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #0ea5e9;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="avatar"></div>
        </div>
        <div class="card-body">
            <h3 class="card-title">Sản Phẩm ABC</h3>
            <p class="card-desc">Mô tả ngắn về sản phẩm. Cung cấp thông tin hữu ích giúp người dùng hiểu sản phẩm.</p>
            <button class="btn">Xem thêm</button>
        </div>
    </div>

</body>
</html>
